@if(cliente) {
<div class="modal-header bg-success text-white">
    <h5 class="modal-title">Stock: {{cliente.nombre}}</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>

</div>
<div class="modal-body">
    @for (p of cliente.productos; track p.id) {
    <div class="d-flex justify-content-between align-items-center mb-3">
        <span>{{p.tipoProducto}}</span>
        <div class="btn-group">
            <button class="btn btn-outline-danger" (click)="ajustar(p, -1)">-</button>
            <span class="px-3 fw-bold">{{p.cantidad}}</span>
            <button class="btn btn-outline-success" (click)="ajustar(p, 1)">+</button>
        </div>
    </div>
    }
</div>
}
